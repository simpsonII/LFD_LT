<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레크레이션 점수판 프로</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
            overflow-x: hidden;
        }

        .play-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }
        .play-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
        }

        .input-style {
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        .input-style:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .history-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .history-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        .history-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s ease forwards; }

        @keyframes scoreUpdate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #3b82f6; }
            100% { transform: scale(1); }
        }
        .score-changed { animation: scoreUpdate 0.4s ease-out; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col max-w-[1600px] mx-auto">

    <header class="text-center mb-8 mt-2">
        <h1 class="text-3xl md:text-5xl font-extrabold text-slate-800 tracking-tight break-keep">🏆 통합 미션 점수판</h1>
        <p class="text-slate-500 mt-2 font-medium text-sm md:text-base break-keep">팀별 점수 부여 및 히스토리 관리 시스템</p>
    </header>

    <!-- 상단 컨트롤 패널 -->
    <section class="bg-white rounded-2xl p-4 md:p-6 mb-8 shadow-sm border border-slate-200 w-full max-w-2xl mx-auto flex flex-col sm:flex-row gap-3">
        <input type="text" id="teamNameInput" placeholder="새로운 팀/참가자 이름 입력" class="input-style flex-1 min-w-0 px-4 py-3 rounded-xl text-base md:text-lg font-medium" onkeypress="if(event.key==='Enter') addTeam()">
        <button onclick="addTeam()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl text-lg font-bold shadow-sm transition-colors shrink-0 whitespace-nowrap">
            팀 추가하기
        </button>
    </section>

    <!-- 메인 대시보드 (반응형 그리드 수정 완료) -->
    <section id="scoreboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 md:gap-6 mb-12 w-full">
        <!-- JS 렌더링 영역 -->
    </section>

    <!-- 하단 글로벌 버튼 -->
    <div class="flex justify-center gap-3 mt-auto pb-8 flex-wrap">
        <button onclick="showWinner()" class="bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-2xl text-lg font-bold shadow-lg transition-transform active:scale-95 shrink-0">
            🎉 최종 우승자 발표
        </button>
        <button onclick="resetAll()" class="bg-white hover:bg-red-50 text-red-600 border border-red-200 px-6 py-4 rounded-2xl text-lg font-bold transition-transform active:scale-95 shrink-0">
            전체 초기화
        </button>
    </div>

    <!-- 우승자 모달 -->
    <div id="winnerModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300 p-4">
        <div class="bg-white p-8 md:p-12 rounded-[2rem] text-center transform scale-95 transition-transform duration-300 shadow-2xl max-w-xl w-full" id="winnerModalContent">
            <h2 class="text-2xl font-bold text-slate-500 mb-2">FINAL WINNER</h2>
            <div id="winnerNames" class="text-4xl md:text-5xl font-extrabold text-blue-600 mb-6 break-keep"></div>
            <div class="bg-slate-50 rounded-2xl py-4 border border-slate-100 mb-8 flex justify-center items-center">
                <span class="text-lg text-slate-500 mr-2 shrink-0">최종 합산</span>
                <span id="winnerScore" class="text-4xl font-black text-slate-800 tabular-nums"></span>
                <span class="text-lg text-slate-500 ml-1 shrink-0">점</span>
            </div>
            <button onclick="closeModal()" class="bg-slate-800 hover:bg-slate-900 text-white px-10 py-4 rounded-xl text-lg font-bold w-full transition-colors">확인</button>
        </div>
    </div>

    <script>
        let teams = [];
        let teamIdCounter = 0;
        let historyIdCounter = 0;

        function render() {
            const board = document.getElementById('scoreboard');
            board.innerHTML = '';

            if (teams.length === 0) {
                board.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 md:py-24 text-slate-400">
                        <svg class="w-16 h-16 md:w-20 md:h-20 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-lg md:text-xl font-bold text-center px-4 break-keep">상단에서 참가 팀을 추가하여 게임을 시작하세요</p>
                    </div>
                `;
                return;
            }

            teams.forEach(team => {
                const totalScore = team.history.reduce((sum, record) => sum + record.score, 0);
                
                let scoreColor = 'text-slate-800';
                if (totalScore > 0) scoreColor = 'text-blue-600';
                if (totalScore < 0) scoreColor = 'text-red-500';

                const historyHTML = team.history.length === 0 
                    ? `<div class="text-center text-slate-400 text-sm py-4">기록이 없습니다.</div>` 
                    : team.history.map(record => `
                        <div class="flex items-center justify-between text-sm py-2 border-b border-slate-100 last:border-0 group gap-2">
                            <span class="text-slate-600 font-medium truncate flex-1" title="${record.mission}">${record.mission}</span>
                            <span class="font-bold tabular-nums shrink-0 text-right ${record.score > 0 ? 'text-blue-500' : 'text-red-500'}">
                                ${record.score > 0 ? '+' : ''}${record.score}
                            </span>
                            <button onclick="deleteHistory(${team.id}, ${record.id})" class="text-slate-300 hover:text-red-500 w-6 h-6 rounded flex items-center justify-center md:opacity-0 md:group-hover:opacity-100 transition-opacity shrink-0" title="기록 삭제">×</button>
                        </div>
                    `).reverse().join(''); 

                const card = document.createElement('div');
                card.className = 'play-card animate-pop w-full';
                card.innerHTML = `
                    <div class="bg-slate-50 px-4 md:px-5 py-4 border-b border-slate-100 flex justify-between items-center relative">
                        <h3 class="text-lg md:text-xl font-bold text-slate-800 truncate pr-8" title="${team.name}">${team.name}</h3>
                        <button onclick="removeTeam(${team.id})" class="absolute right-3 top-3 text-slate-400 hover:text-red-500 transition-colors bg-white hover:bg-red-50 w-7 h-7 rounded-full flex items-center justify-center text-lg leading-none shrink-0">&times;</button>
                    </div>
                    
                    <div class="py-5 md:py-6 text-center shrink-0">
                        <div class="text-xs md:text-sm font-bold text-slate-400 mb-1">TOTAL SCORE</div>
                        <div id="score-${team.id}" class="text-4xl md:text-5xl lg:text-6xl font-black tabular-nums tracking-tight ${scoreColor} break-all px-2">
                            ${totalScore}
                        </div>
                    </div>

                    <div class="px-3 md:px-5 pb-4 md:pb-5 shrink-0">
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col gap-2">
                            <input type="text" id="mission-${team.id}" placeholder="미션명/내역 (예: 1라운드 1등)" class="input-style w-full px-3 py-2 rounded-lg text-sm font-medium" onkeypress="if(event.key==='Enter') document.getElementById('scoreInput-${team.id}').focus()">
                            <div class="flex gap-2 w-full">
                                <input type="number" id="scoreInput-${team.id}" placeholder="획득 점수" class="input-style flex-1 min-w-0 px-3 py-2 rounded-lg text-sm md:text-base font-bold tabular-nums" onkeypress="if(event.key==='Enter') addScore(${team.id})">
                                <button onclick="addScore(${team.id})" class="bg-slate-800 hover:bg-slate-700 text-white px-3 md:px-4 py-2 rounded-lg text-sm font-bold transition-colors whitespace-nowrap shrink-0">
                                    적용
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="px-3 md:px-5 pb-4 md:pb-5 flex-1 flex flex-col min-h-[120px]">
                        <div class="text-xs font-bold text-slate-400 mb-2 px-1">기록 히스토리</div>
                        <div class="history-scroll bg-white border border-slate-100 rounded-xl px-3 py-1 flex-1 h-[140px] md:h-[160px] overflow-y-auto">
                            ${historyHTML}
                        </div>
                    </div>
                `;
                board.appendChild(card);
            });
        }

        function addTeam() {
            const input = document.getElementById('teamNameInput');
            const name = input.value.trim();
            if (name) {
                teams.push({ id: ++teamIdCounter, name: name, history: [] });
                input.value = '';
                input.focus();
                render();
            }
        }

        function removeTeam(id) {
            if (confirm('팀과 모든 기록을 삭제하시겠습니까?')) {
                teams = teams.filter(t => t.id !== id);
                render();
            }
        }

        function addScore(teamId) {
            const missionInput = document.getElementById(`mission-${teamId}`);
            const scoreInput = document.getElementById(`scoreInput-${teamId}`);
            
            const missionName = missionInput.value.trim() || "기본 점수 부여";
            const score = parseInt(scoreInput.value);

            if (isNaN(score) || score === 0) {
                scoreInput.focus();
                return;
            }

            const team = teams.find(t => t.id === teamId);
            if (team) {
                team.history.push({
                    id: ++historyIdCounter,
                    mission: missionName,
                    score: score
                });
                render();
                animateScore(teamId);
            }
        }

        function deleteHistory(teamId, recordId) {
            const team = teams.find(t => t.id === teamId);
            if (team) {
                team.history = team.history.filter(h => h.id !== recordId);
                render();
                animateScore(teamId);
            }
        }

        function animateScore(teamId) {
            const scoreEl = document.getElementById(`score-${teamId}`);
            if (scoreEl) {
                scoreEl.classList.remove('score-changed');
                void scoreEl.offsetWidth; 
                scoreEl.classList.add('score-changed');
            }
        }

        function resetAll() {
            if (teams.length > 0 && confirm('모든 팀의 점수 기록을 초기화하시겠습니까?\n(팀 목록은 유지됩니다)')) {
                teams.forEach(t => t.history = []);
                render();
            }
        }

        function showWinner() {
            if (teams.length === 0) {
                alert('등록된 팀이 없습니다.');
                return;
            }

            const teamScores = teams.map(t => {
                return {
                    name: t.name,
                    score: t.history.reduce((sum, rec) => sum + rec.score, 0)
                };
            });

            const maxScore = Math.max(...teamScores.map(t => t.score));
            const winners = teamScores.filter(t => t.score === maxScore);

            const modal = document.getElementById('winnerModal');
            const modalContent = document.getElementById('winnerModalContent');
            
            document.getElementById('winnerNames').innerText = winners.map(w => w.name).join(', ');
            document.getElementById('winnerScore').innerText = maxScore;

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);

            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6', '#10b981', '#f59e0b'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function closeModal() {
            const modal = document.getElementById('winnerModal');
            const modalContent = document.getElementById('winnerModalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        render();
    </script>
</body>
</html>
